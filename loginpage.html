<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #406bb29a, #89ecd19e);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-container {
      background: #b4d2fd;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0px 4px 15px rgba(209, 43, 43, 0.2);
      width: 300px;
      text-align: center;
    }

    .login-container h2 {
      margin-bottom: 20px;
      color: #333;
    }

    .login-container input,
    .login-container select {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #491c1c;
      border-radius: 8px;
      font-size: 14px;
    }

    .login-container button {
      width: 100%;
      padding: 12px;
      background-color: #3181c8;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .login-container button:hover {
      background-color: #0066cc;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Login</h2>
    <form  action="mainpage.html" >
      <input type="text" placeholder="Enter Name" required>
      <input type="password" placeholder="Enter Password" required>
      <select required>
        <option value="" disabled selected> Store code</option>
        <option value="store1">Zone North</option>
        <option value="store2">Zone south</option>
        <option value="store3">Zone East</option>
      </select>
      <button type="submit">Login</button>
    </form>
  </div>
</body>
</html>
