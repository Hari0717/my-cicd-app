<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Shopping Cart</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    h1 {
      text-align: center;
    }

    .products {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .product {
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 10px;
      width: 200px;
      text-align: center;
    }

    .product img {
      width: 100%;
      border-radius: 10px;
    }

    .cart {
      margin-top: 30px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border: 1px solid #ccc;
      text-align: center;
    }

    button {
      padding: 5px 10px;
      cursor: pointer;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 5px;
    }

    button:hover {
      background-color: #218838;
    }
  </style>
</head>
<body>

<h1>Simple Shopping Cart</h1>

<div class="products">
  <div class="product">
    <img src="https://via.placeholder.com/150" alt="Product 1">
    <h3>Product 1</h3>
    <p>$10</p>
    <input type="number" min="1" value="1" id="qty1">
    <button onclick="addToCart('Product 1', 10, 'qty1')">Add to Cart</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/150" alt="Product 2">
    <h3>Product 2</h3>
    <p>$20</p>
    <input type="number" min="1" value="1" id="qty2">
    <button onclick="addToCart('Product 2', 20, 'qty2')">Add to Cart</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/150" alt="Product 3">
    <h3>Product 3</h3>
    <p>$15</p>
    <input type="number" min="1" value="1" id="qty3">
    <button onclick="addToCart('Product 3', 15, 'qty3')">Add to Cart</button>
  </div>
</div>

<div class="cart">
  <h2>Shopping Cart</h2>
  <table id="cartTable">
    <tr>
      <th>Product</th>
      <th>Price</th>
      <th>Quantity</th>
      <th>Total</th>
    </tr>
  </table>
  <h3 id="grandTotal">Grand Total: $0</h3>
</div>

<script>
  let grandTotal = 0;

  function addToCart(name, price, qtyId) {
    const qty = document.getElementById(qtyId).value;
    const total = price * qty;
    grandTotal += total;

    const table = document.getElementById('cartTable');
    const row = table.insertRow(-1);

    row.insertCell(0).innerText = name;
    row.insertCell(1).innerText = `$${price}`;
    row.insertCell(2).innerText = qty;
    row.insertCell(3).innerText = `$${total}`;

    document.getElementById('grandTotal').innerText = `Grand Total: $${grandTotal}`;
  }
</script>

</body>
</html>
